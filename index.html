<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PADMAVYUH — Simple Build</title>
  <style>
    html,body{margin:0;height:100%;background:#000;color:#f5d25c;font-family:Georgia,serif}
    #game{display:block;width:100vw;height:100vh;background:#02030a}
    .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:radial-gradient(circle,#0a0a20 0%,#000 70%)}
    button{padding:12px 26px;background:#101020;border:1px solid #f5d25c;color:#f5d25c;font-size:18px;cursor:pointer}
    input{padding:10px;width:420px;max-width:90vw;background:#080813;color:#eee;border:1px solid #555}
    #hud{position:fixed;top:10px;left:10px;font-size:14px;line-height:1.4;background:rgba(0,0,0,.45);padding:8px 10px;border:1px solid #444;display:none}
    #end{display:none}
  </style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud"></div>
<div id="start" class="overlay">
  <h1>PADMAVYUH</h1>
  <p>Simple playable hackathon build. Use WASD / Arrow Keys. Reach the center.</p>
  <input id="apiKey" placeholder="Enter ElevenLabs API key (xi-api-key)" />
  <button id="startBtn">Start Game</button>
</div>
<div id="end" class="overlay">
  <h2>You found him.</h2>
  <button onclick="location.reload()">Restart</button>
</div>
<script>
const AGENT_ID = "agent_6001kqakwmw4e6cv8nd5wj3vgp5p"; // reserved for later conversational mode
const KRISHNA_VOICE_ID = "pNInz6obpgDQGcFmaJgB";
const ABHIMANYU_VOICE_ID = "IKne3meq5aSn9XLyUdCD";

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
let w,h,cx,cy;
function resize(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;cx=w/2;cy=h/2}
addEventListener('resize', resize); resize();

const player={x:80,y:80,r:9,speed:3};
const center={x:()=>cx,y:()=>cy,r:28};
const keys={};
let started=false, finished=false;
let apiKey='';
let activeAudio=[];

const rings=[
  {size:520,gapSide:'top',gapStart:-55,gapEnd:55},
  {size:380,gapSide:'right',gapStart:-40,gapEnd:40},
  {size:250,gapSide:'bottom',gapStart:-45,gapEnd:45}
];

function ringWalls(r){
  const hs=r.size/2, x=cx-hs, y=cy-hs, s=r.size;
  const seg=[];
  const cut=(a,b)=>[{a:a,b:b}];
  if(r.gapSide==='top'){
    seg.push({x1:x,y1:y,x2:cx+r.gapStart,y2:y},{x1:cx+r.gapEnd,y1:y,x2:x+s,y2:y});
    seg.push({x1:x,y1:y,x2:x,y2:y+s},{x1:x+s,y1:y,x2:x+s,y2:y+s},{x1:x,y1:y+s,x2:x+s,y2:y+s});
  } else if(r.gapSide==='right'){
    seg.push({x1:x+s,y1:y,x2:x+s,y2:cy+r.gapStart},{x1:x+s,y1:cy+r.gapEnd,x2:x+s,y2:y+s});
    seg.push({x1:x,y1:y,x2:x+s,y2:y},{x1:x,y1:y+s,x2:x+s,y2:y+s},{x1:x,y1:y,x2:x,y2:y+s});
  } else {
    seg.push({x1:x,y1:y+s,x2:cx+r.gapStart,y2:y+s},{x1:cx+r.gapEnd,y1:y+s,x2:x+s,y2:y+s});
    seg.push({x1:x,y1:y,x2:x+s,y2:y},{x1:x,y1:y,x2:x,y2:y+s},{x1:x+s,y1:y,x2:x+s,y2:y+s});
  }
  return seg;
}

function collides(nx,ny){
  const pad=player.r+1;
  for(const r of rings){
    for(const s of ringWalls(r)){
      if(s.x1===s.x2){ // vertical
        const minY=Math.min(s.y1,s.y2), maxY=Math.max(s.y1,s.y2);
        if(Math.abs(nx-s.x1)<=pad && ny>=minY-pad && ny<=maxY+pad) return true;
      }else{ // horizontal
        const minX=Math.min(s.x1,s.x2), maxX=Math.max(s.x1,s.x2);
        if(Math.abs(ny-s.y1)<=pad && nx>=minX-pad && nx<=maxX+pad) return true;
      }
    }
  }
  return nx<player.r||ny<player.r||nx>w-player.r||ny>h-player.r;
}

async function speakEleven(text,voiceId,volume=1){
  if(!apiKey) return;
  try{
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`,{
      method:'POST',
      headers:{'xi-api-key':apiKey,'Content-Type':'application/json'},
      body:JSON.stringify({text,model_id:'eleven_monolingual_v1'})
    });
    if(!res.ok){
      const t=await res.text();
      console.error('ElevenLabs TTS failed:',res.status,t);
      return;
    }
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    const audio=new Audio(url);
    audio.volume=Math.max(0,Math.min(1,volume));
    activeAudio.push(audio);
    audio.onended=()=>URL.revokeObjectURL(url);
    await audio.play();
  }catch(err){console.error('Audio playback error:',err)}
}

function hintText(){
  const dx=cx-player.x, dy=cy-player.y;
  if(Math.abs(dx)>Math.abs(dy)) return dx>0?'Go right':'Go left';
  return dy>0?'Move down':'Move up';
}

function loop(){
  if(!started) return;
  let vx=(keys['ArrowRight']||keys['d']?1:0)-(keys['ArrowLeft']||keys['a']?1:0);
  let vy=(keys['ArrowDown']||keys['s']?1:0)-(keys['ArrowUp']||keys['w']?1:0);
  const len=Math.hypot(vx,vy)||1; vx/=len; vy/=len;
  const nx=player.x+vx*player.speed, ny=player.y+vy*player.speed;
  if(!collides(nx,player.y)) player.x=nx;
  if(!collides(player.x,ny)) player.y=ny;

  const dist=Math.hypot(player.x-cx,player.y-cy);
  if(dist<center.r+8 && !finished){ endGame(); }

  draw(dist);
  requestAnimationFrame(loop);
}

function draw(dist){
  ctx.fillStyle='#01030d'; ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='rgba(245,210,92,.6)'; ctx.lineWidth=3;
  for(const r of rings){ for(const s of ringWalls(r)){ ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke(); } }
  ctx.beginPath(); ctx.arc(cx,cy,center.r,0,Math.PI*2); ctx.fillStyle='rgba(255,180,80,.15)'; ctx.fill();
  ctx.beginPath(); ctx.arc(player.x,player.y,player.r+8,0,Math.PI*2); ctx.fillStyle='rgba(120,180,255,.2)'; ctx.fill();
  ctx.beginPath(); ctx.arc(player.x,player.y,player.r,0,Math.PI*2); ctx.fillStyle='#9dd0ff'; ctx.fill();
  hud.textContent=`Agent: ${AGENT_ID} | Distance to center: ${Math.round(dist)}`;
}

async function endGame(){
  finished=true; started=false;
  await speakEleven('Abhimanyu... I found you.',ABHIMANYU_VOICE_ID,1);
  document.getElementById('end').style.display='flex';
}

document.getElementById('startBtn').addEventListener('click', async()=>{
  apiKey=document.getElementById('apiKey').value.trim();
  document.getElementById('start').style.display='none';
  hud.style.display='block';
  started=true;
  await speakEleven('Arjuna, listen carefully. Reach your son at the center.',KRISHNA_VOICE_ID,1);
  setInterval(()=>{ if(started&&!finished) speakEleven(hintText(),KRISHNA_VOICE_ID,0.95); },6000);
  setInterval(()=>{ if(started&&!finished){ const d=Math.hypot(player.x-cx,player.y-cy); const v=Math.max(0.15,1-d/700); speakEleven('Father... I am here.',ABHIMANYU_VOICE_ID,v);} },9000);
  requestAnimationFrame(loop);
});

addEventListener('keydown',e=>keys[e.key]=true);
addEventListener('keyup',e=>keys[e.key]=false);
</script>
</body>
</html>
